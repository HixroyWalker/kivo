workflows:
  gcp-serverless-deploy:
    name: KiVo Santa Cruz Pilot Deployment
    instance_type: linux_x2
    max_build_duration: 30
    environment:
      groups:
        - google_credentials
    scripts:
      - name: Repair Project and Auth
        script: |
          # 1. Generate missing folders
          flutter create . --platforms=android,ios
          flutter pub get
          
          # 2. Setup Authentication using the JSON you provided
          # Note: Project ID changed to match your key file
          echo $GCLOUD_SERVICE_ACCOUNT_KEY > gcp_key.json
          gcloud auth activate-service-account 528782602565-compute@developer.gserviceaccount.com --key-file=gcp_key.json --project=alert-basis-134223
          
      - name: Build and Deploy Backend
        script: |
          # 3. Configure Docker
          gcloud auth configure-docker --quiet
          
          # 4. Build and Push (Explicitly pointing to the backend folder)
          docker build -t gcr.io/alert-basis-134223/kivo-backend:latest -f backend/Dockerfile ./backend
          docker push gcr.io/alert-basis-134223/kivo-backend:latest
          
          # 5. Deploy to Cloud Run
          gcloud run deploy kivo-service \
            --image gcr.io/alert-basis-134223/kivo-backend:latest \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --project=alert-basis-134223
