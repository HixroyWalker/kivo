steps:
  # Diagnostic: show exactly what Cloud Build cloned
  - name: 'ubuntu'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "=== Repo root ===" && ls -la
        echo "=== backend/ ===" && ls -la backend/ || echo "ERROR: backend/ folder missing from repo"

  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'gcr.io/alert-basis-134223/kivo-backend:latest',
      '-f', 'backend/Dockerfile',
      './backend'
    ]

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/alert-basis-134223/kivo-backend:latest']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'kivo-service'
      - '--image'
      - 'gcr.io/alert-basis-134223/kivo-backend:latest'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

options:
  logging: CLOUD_LOGGING_ONLY
images:
  - 'gcr.io/alert-basis-134223/kivo-backend:latest'
